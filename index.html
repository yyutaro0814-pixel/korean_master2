<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ハングル・マスター | モダン韓国語学習</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        background: '#ffffff',
                        foreground: '#0f172a',
                        card: '#ffffff',
                        border: '#e2e8f0',
                        muted: '#f1f5f9',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                        headline: ['Noto Sans JP', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* メニューと中身が重ならないようにする魔法のコード */
@media (max-width: 768px) {
    aside {
        width: 100% !important;
        height: auto !important;
        position: relative !important;
    }
    main {
        padding: 10px !important;
    }
    .flex.h-screen {
        flex-direction: column !important;
        overflow-y: auto !important;
    }
}

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="font-sans text-foreground bg-slate-50 antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const COMMON_WORDS = ["안녕하세요", "감사합니다", "친구", "사랑", "행복", "노력", "열정", "희망", "추억", "우주"];
        
        const WORDS_POOL = [
            { w: "안녕하세요", c: "こんにちは" },
            { w: "감사합니다", c: "ありがとうございます" },
            { w: "친구", c: "友達" },
            { w: "학교", c: "学校" },
            { w: "우유", c: "牛乳" },
            { w: "사과", c: "りんご" },
            { w: "물", c: "水" },
            { w: "날씨", c: "天気" },
            { w: "가족", c: "家族" },
            { w: "선생님", c: "先生" }
        ];

        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Navigation = ({ activeTab, setActiveTab }) => {
            const links = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'ダッシュボード' },
                { id: 'game', icon: 'gamepad-2', label: 'トレーニング' },
                { id: 'saved', icon: 'bookmark', label: '保存済み' },
            ];

            return (
                <nav className="flex md:flex-col h-full items-center md:items-stretch gap-6 py-6 px-4 md:px-6">
                    <div className="hidden md:flex items-center gap-3 px-2 mb-10">
                        <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                            <span className="text-xl font-bold">한</span>
                        </div>
                        <div className="flex flex-col">
                            <span className="text-lg font-bold tracking-tight">ハングルマスター</span>
                            <span className="text-[9px] uppercase tracking-widest text-slate-400 font-bold">Korean Edition</span>
                        </div>
                    </div>
                    <div className="flex md:flex-col gap-2 flex-1">
                        {links.map((link) => (
                            <button
                                key={link.id}
                                onClick={() => setActiveTab(link.id)}
                                className={`group flex flex-col md:flex-row items-center gap-3 px-4 py-3 rounded-2xl transition-all ${
                                    activeTab === link.id ? "bg-blue-600 text-white shadow-lg" : "text-slate-500 hover:bg-slate-100"
                                }`}
                            >
                                <LucideIcon name={link.icon} size={20} />
                                <span className="text-[10px] md:text-sm font-bold">{link.label}</span>
                            </button>
                        ))}
                    </div>
                </nav>
            );
        };

        const Dashboard = () => {
            const dailyWord = useMemo(() => COMMON_WORDS[Math.floor(Math.random() * COMMON_WORDS.length)], []);
            return (
                <div class="space-y-12 animate-in fade-in duration-700">
                    <header class="space-y-4">
                        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-50 text-blue-600 text-[10px] font-bold uppercase tracking-wider">
                            <LucideIcon name="graduation-cap" size={14} /> 語彙力をレベルアップ
                        </div>
                        <h1 class="text-4xl md:text-6xl font-black leading-tight">안녕하세요. <br /><span class="text-slate-400 font-medium">韓国語の世界へようこそ。</span></h1>
                    </header>
                    <div class="relative group max-w-2xl">
                        <div class="flex items-center p-2 rounded-3xl bg-white border-2 border-slate-100 shadow-xl">
                            <div class="pl-4 text-slate-400"><LucideIcon name="search" size={24} /></div>
                            <input type="text" placeholder="単語を検索..." class="flex-1 h-12 px-4 text-lg border-none focus:ring-0 outline-none" />
                            <button class="bg-slate-900 text-white px-6 h-12 rounded-2xl font-bold hover:bg-slate-800 transition-all">検索</button>
                        </div>
                    </div>
                    <div class="bg-slate-900 rounded-[2.5rem] p-8 md:p-12 text-white relative overflow-hidden">
                        <div class="relative z-10 space-y-4">
                            <span class="text-[10px] uppercase tracking-widest font-black text-blue-400">今日の単語</span>
                            <h2 class="text-5xl md:text-7xl font-bold tracking-tighter">{dailyWord}</h2>
                            <button class="bg-white text-slate-900 px-8 h-16 rounded-2xl font-bold flex items-center gap-3 hover:translate-x-1 transition-transform shadow-xl">詳しく見る <LucideIcon name="arrow-right" size={20} /></button>
                        </div>
                    </div>
                </div>
            );
        };

        const Training = () => {
            const [gameState, setGameState] = useState('selection');
            const [score, setScore] = useState(0);
            const [currentIdx, setCurrentIdx] = useState(0);
            
            const questions = useMemo(() => WORDS_POOL.sort(() => Math.random() - 0.5).slice(0, 5), []);

            if (gameState === 'playing') {
                const q = questions[currentIdx];
                const options = useMemo(() => {
                    const opts = [q.c];
                    while(opts.length < 4) {
                        const r = WORDS_POOL[Math.floor(Math.random() * WORDS_POOL.length)].c;
                        if (!opts.includes(r)) opts.push(r);
                    }
                    return opts.sort(() => Math.random() - 0.5);
                }, [currentIdx]);

                const handleAnswer = (ans) => {
                    if (ans === q.c) setScore(s => s + 10);
                    if (currentIdx < questions.length - 1) setCurrentIdx(c => c + 1);
                    else setGameState('finished');
                };

                return (
                    <div class="max-w-2xl mx-auto space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                        <div class="bg-slate-900 p-12 rounded-[3rem] text-white text-center space-y-4">
                            <span class="text-blue-400 font-bold uppercase tracking-widest">意味を選んでください</span>
                            <h2 class="text-6xl font-bold tracking-tighter">{q.w}</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {options.map(opt => (
                                <button key={opt} onClick={() => handleAnswer(opt)} class="p-6 rounded-2xl bg-white border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition-all text-lg font-bold text-slate-700">{opt}</button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'finished') {
                return (
                    <div class="text-center space-y-8 py-12">
                        <div class="w-24 h-24 bg-blue-600 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl animate-bounce"><LucideIcon name="trophy" size={48} /></div>
                        <h2 class="text-4xl font-black">スコア: {score} PTS</h2>
                        <button onClick={() => location.reload()} class="bg-slate-900 text-white px-12 h-16 rounded-2xl font-bold">トップへ戻る</button>
                    </div>
                );
            }

            return (
                <div class="space-y-8">
                    <h2 class="text-3xl font-black">難易度を選択</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {['初級', '中級', '上級'].map(l => (
                            <button key={l} onClick={() => setGameState('playing')} class="p-8 rounded-[2.5rem] bg-white border border-slate-100 shadow-sm hover:shadow-xl transition-all text-left">
                                <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 mb-6"><LucideIcon name="zap" /></div>
                                <h3 class="text-2xl font-bold">{l}</h3>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            return (
                <div class="flex h-screen bg-slate-50 font-sans">
                    <aside class="w-24 md:w-72 border-r bg-white/50 backdrop-blur-xl z-10 flex flex-col">
                        <Navigation activeTab={activeTab} setActiveTab={setActiveTab} />
                    </aside>
                    <main class="flex-1 overflow-y-auto p-6 md:p-16">
                        <div class="max-w-5xl mx-auto">
                            {activeTab === 'dashboard' && <Dashboard />}
                            {activeTab === 'game' && <Training />}
                            {activeTab === 'saved' && <div class="text-center py-20 bg-white rounded-[2.5rem] text-slate-300"><LucideIcon name="bookmark" size={40} class="mx-auto mb-4" />履歴はありません</div>}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
